name: iOS CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: macos-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Build and Test
      run: |
        xcodebuild test \
          -project SakuttoSeat.xcodeproj \
          -scheme SakuttoSeat \
          -destination 'platform=iOS Simulator,name=Any iOS Simulator Device' \
          -quiet
